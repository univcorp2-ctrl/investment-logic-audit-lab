name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Generate sample audit report
        run: investment-audit sample --out outputs

      - name: Upload audit outputs
        uses: actions/upload-artifact@v4
        with:
          name: investment-audit-outputs-${{ matrix.python-version }}
          path: outputs/
