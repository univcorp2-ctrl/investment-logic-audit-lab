name: Repository Inventory

on:
  workflow_dispatch:
    inputs:
      owner:
        description: "GitHub user or org to scan. Leave blank to use token-visible repos."
        required: false
        default: ""
      keywords:
        description: "Comma-separated keywords"
        required: false
        default: "stock,stocks,equity,equities,crypto,bitcoin,btc,eth,trading,investment,portfolio,alpha,backtest,finance"

jobs:
  inventory:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run repository inventory
        env:
          GH_INVENTORY_TOKEN: ${{ secrets.GH_INVENTORY_TOKEN || github.token }}
          GH_INVENTORY_OWNER: ${{ inputs.owner }}
        run: |
          python -m investment_audit.github_repos \
            --owner "${GH_INVENTORY_OWNER}" \
            --keywords "${{ inputs.keywords }}" \
            --out outputs/repo_inventory

      - name: Upload repository inventory
        uses: actions/upload-artifact@v4
        with:
          name: investment-repo-inventory
          path: outputs/repo_inventory/
